        articles: [
          { title: 'Определение типа кожи', text: `**Почему это важно?** Большинство мужчин используют первое попавшееся средство, не зная свой тип. Итог: пересушивание, ещё больше жира или прыщи. Определи тип — подбери уход.\n\n**Типы кожи:**\n- **Жирная:** расширенные поры, сальный блеск через пару часов после умывания, склонность к чёрным точкам и акне.\n- **Сухая:** стянутость, шелушение (особенно после умывания), малозаметные поры, часто чувствительная.\n- **Комбинированная:** Т-зона (лоб, нос, подбородок) жирная, щёки нормальные или сухие. Самый частый тип.\n- **Нормальная:** гладкая, ровный тон, поры незаметны — мечта, но встречается редко.\n\n**Домашний тест:** умойся мягким средством без добавок, промокни лицо и ничего не наноси 1 час.\n- Если всё лицо блестит — жирная.\n- Только Т-зона — комбинированная.\n- Стянутость и шелушение — сухая.\n- Комфорт без блеска — нормальная.\n\n**Подбор средств:**\n- Жирная: гель с салициловой кислотой 2% (Stridex pads, ~500₽), лёгкий увлажняющий гель-крем без масел (Bioderma Sebium Mat Control, ~1100₽).\n- Сухая: крем-гель с церамидами и маслами (CeraVe Moisturising Cream, ~1000₽).\n- Комби: тонер с ниацинамидом (The Ordinary Niacinamide 10% + Zinc 1%, ~900₽) балансирует себум.\n\nПонимание типа — половина успеха. Меняй уход по сезону: зимой более питательный, летом легче.` },
          { title: 'Лучшие умывалки (рейтинг)', text: `**Почему не мыло?** У мыла щелочной pH 9-10, он разрушает защитный липидный барьер, делая кожу уязвимой. Нужно мягкое средство с pH 5-6.\n\n**ТОП-5 проверенных умывалок:**\n1. **CeraVe SA Smoothing Cleanser (~1300₽)** — с салициловой кислотой и керамидами, обновляет кожу, не сушит. Для жирной и проблемной.\n2. **La Roche-Posay Toleriane Caring Wash (~1100₽)** — молочко, очень мягкое, с ниацинамидом, для чувствительной и реактивной кожи.\n3. **COSRX Low pH Good Morning Gel (~1000₽)** — гель с чайным деревом, бетаин, pH 5.5, для нормальной/комби. Освежает.\n4. **Bulldog Original Face Wash (~500₽)** — натуральные масла (розмарин, чайное дерево), без синтетических отдушек, для нормальной кожи.\n5. **Avene Cleanance Gel (~900₽)** — для жирной и акне, с термальной водой, убирает блеск.\n\n**Техника:** выдави 1-2 нажатия, вспень в ладонях, нанеси на влажное лицо круговыми движениями, избегая области вокруг глаз. Смывай прохладной водой (закрывает поры). Умывайся 2 раза в день.` },
          { title: 'Борьба с прыщами (полная схема)', text: `**Откуда берутся прыщи?** Избыток кожного сала + отмершие клетки забивают пору → создаётся пробка (комедон). Бактерии Propionibacterium acnes размножаются в этой пробке → воспаление, гной. Факторы: гормоны, стресс, неправильное питание, грязные наволочки, комедогенная косметика.\n\n**Системный подход:**\n**Утро:**\n- Мягкое очищение.\n- Лёгкий увлажняющий гель.\n- Санскрин SPF30+ (обязательно, даже если дома! UV усиливает постакне).\n\n**Вечер:**\n- Очищение с салициловой кислотой 2% или бензоил пероксидом (5%).\n- Точечно на воспаления: Базирон АС 5% (гель) или Зинерит (эритромицин+цинк, рецепт). Не мажь всё лицо!\n- Увлажнение лёгким флюидом.\n\n**Дополнительно:**\n- Меняй наволочку каждые 3 дня (лучше каждый день одну сторону).\n- Исключи из еды на 2-3 недели молочное и сахар — часто они провоцируют акне.\n- Пей отвар крапивы (1 ст.л. на стакан кипятка, 3 раза в день) — кровоочистительное, противовоспалительное.\n\n**Секретное оружие — аптечная болтушка:** готовят по рецепту дерматолога: сера, цинк, левомицетин (или эритромицин), салициловая кислота, спирт. Цена ~300-500₽. Наносить точечно на ночь, взбалтывая. Сушит быстрее дорогих кремов, но может шелушить — увлажняй сверху.` },
          { title: 'Чёрные точки: удаление', text: `**Что это?** Открытые комедоны — окислившийся себум в порах. Выдавливание травмирует и расширяет поры, оставляет шрамы.\n\n**Правильная схема:**\n1. **Распаривание** — душ или паровая ванночка с ромашкой 5 минут (не обжигаясь). Поры раскрываются.\n2. **Пилинг-скатка** с AHA/BHA кислотами (Mizon Apple Smoothie Peeling Gel, ~800₽) — нанести, помассировать, она скатывает ороговевшие клетки и растворяет верхушки комедонов.\n3. **Маска-плёнка или полоски** для носа — только 1 раз в неделю, не чаще, чтобы не травмировать.\n4. **Сужение пор:** холодная вода + тонер с ниацинамидом или гамамелисом.\n\n**Профилактика:** тонер с салициловой кислотой ежедневно вечером, глиняная маска (чёрная или голубая глина) 2 раза в неделю. Регулярное отшелушивание не даёт точкам образовываться.` },
          { title: 'Солнцезащита (anti-age №1)', text: `**Миф:** мужчинам не нужен санскрин. **Факт:** 80% видимого старения вызвано солнцем. UV лучи разрушают коллаген, вызывают пигментацию и рак кожи. SPF нужен круглый год, даже в пасмурную погоду.\n\n**Выбирай лёгкие текстуры:**\n- Biore UV Aqua Rich Watery Essence SPF50+ PA++++ (~1200₽) — невесомый гель, без запаха, быстро впитывается.\n- COSRX Aloe Soothing Sun Cream SPF50 (~1400₽) — увлажняет, подходит чувствительной.\n- La Roche-Posay Anthelios Invisible Fluid SPF50+ (~1500₽) — для склонной к жирности, матирует.\n\n**Правила нанесения:**\n- За 20 минут до выхода.\n- 1 чайная ложка (примерно 1.25 мл) на лицо и шею — малое количество снижает защиту в разы.\n- Обновлять каждые 2-3 часа, особенно если вспотел или купался.\n\nДаже в городе через окна проникает UVA. Поставь тюбик на видное место, сделай привычкой. Это самая дешёвая инвестиция в молодость.` },
          { title: 'Секретный способ: аптечная мазь от всего', text: `**Цинковая мазь 10% (около 70₽)** — незаслуженно забытое средство. Оксид цинка — сильное противовоспалительное, подсушивающее, антисептическое.\n\n**Как применять:**\n- **Точечно на прыщи** — на ночь ватной палочкой толстым слоем. Утром воспаление уменьшается.\n- **Маска на Т-зону** — смешать с каплей воды, нанести тонким слоем на 1 час, смыть. Убирает жирный блеск, стягивает поры. Не чаще 1 раза в неделю.\n- **После бритья** — тонкий слой на 20 минут при раздражении, покраснении. Успокаивает.\n\nНедостаток: сильно сушит, поэтому после смывания обязательно увлажнение. Не использовать постоянно на всё лицо.` }
        ]

      {
        id: 'c2',
        icon: '💇‍♂️',
        name: 'Волосы',
        count: 5,
        articles: [
          { title: 'Тип волос и шампуни', text: `**Не все шампуни одинаковы.** Выбор зависит от кожи головы, а не от длины волос.\n- **Жирная кожа:** быстро пачкается, зуд. Нужен шампунь с регулирующими компонентами (салициловая кислота, цинк, экстракты). Vichy Dercos Sebo-Control (~1300₽) — матирует, убирает перхоть.\n- **Сухая/чувствительная:** стянутость, шелушение. Безсульфатный мягкий шампунь. Bioderma Node Fluid (~1100₽) — не пенится, но очищает, увлажняет.\n- **Для объёма:** American Crew Daily Shampoo (~1800₽) с протеинами пшеницы.\n- **Перхоть:** Nizoral (кетоконазол 2%, ~900₽) аптечный, применять 2-3 раза в неделю курсом месяц.\n\n**Лайфхак двойного мытья:** первый раз смывает грязь и стайлинг, второй — даёт активным веществам проникнуть. Наноси шампунь только на корни, массируй, не размазывай по длине — она моется стекающей пеной.` },
          { title: 'Перхоть: убираем навсегда', text: `**Причина:** дрожжевой грибок Malassezia, который питается кожным салом. Разрастается при стрессе, неправильном питании, снижении иммунитета.\n\n**Протокол лечения:**\n1. Шампунь с кетоконазолом 2% (Nizoral) — оставить на 3-5 минут на коже головы, смыть. Использовать 2 раза в неделю 4 недели. Убивает грибок.\n2. В остальные дни — шампунь с цинком пиритионом (Head & Shoulders Клиническая версия, ~600₽) или с дёгтем (Фридерм, ~800₽) для поддержания.\n3. После мытья ополаскивать раствором яблочного уксуса (1 ст.л. на стакан воды) — восстанавливает кислотный баланс, подавляет грибок.\n4. Сушить феном на тёплом/холодном режиме, влажность не оставлять.\n\n**Диета:** исключи дрожжевой хлеб, сахар, пиво на 3-4 недели. Добавь пробиотики (квашеная капуста, йогурт без сахара). Часто перхоть уходит после нормализации микрофлоры кишечника.` },
          { title: 'Выпадение: что реально работает', text: `**Главный враг — дигидротестостерон (ДГТ)**. Он сокращает фазу роста волос, фолликулы миниатюризируются. Наследственность.\n**Что делать:**\n- **Миноксидил 5%** (Generico, ~1000₽/мес) — единственное доказанное средство для стимуляции роста. Наносить 1 мл на сухую кожу головы 2 раза в день, не смывать. Первые 2-3 месяца может усилиться выпадение (старые волосы выталкиваются новыми) — это норма, не бросай. Результат через 6 мес.\n- **Мезороллер (дермароллер)** 0.5-1.5 мм раз в 7-10 дней — прокатывать до лёгкого покраснения, затем нанести сыворотку с пептидами (The Ordinary Multi-Peptide Serum, ~1900₽). Усиливает проникновение и запускает регенерацию.\n- **Кофеиновый шампунь** (Alpecin C1, ~800₽) — для ежедневного массажа.\n- **Масло чёрного тмина** (холодный отжим) — наносить на проборы 2-3 капли, массировать, оставлять на ночь. Содержит тимохинон, который укрепляет луковицы.\n- **Питание:** достаточно белка, железа, цинка, биотина.` },
          { title: 'Укладка без вреда', text: `**Проблема:** гели и воски на основе парафина забивают поры, создают парниковый эффект, перхоть.\n**Безопасная альтернатива:**\n- Глина для волос (Byrd Clay Pomade, ~2200₽) — водорастворимая, матовый финиш, лечебный уход.\n- Солевой спрей для текстуры: самодельный (раствори морскую соль в тёплой воде + гель алоэ вера, распыляй). Придаёт волосам объём и лёгкую волну.\n- Масло арганы или виноградной косточки — 1 капля на кончики для блеска.\n\n**Правило:** смывай стайлинг перед сном, не спи с ним. Периодически делай пилинг кожи головы с энзимами для удаления остатков укладочных средств.` },
          { title: 'Секретный метод: мезороллер дома', text: `**Что даёт?** Микроиглы создают микроканалы, через которые сыворотки проникают в дерму, плюс стимуляция кровотока и факторов роста.\n**Инструкция:**\n1. Продезинфицируй роллер (0.5 мм) спиртом 70%.\n2. Вымой голову, высуши.\n3. Раздели на проборы, прокатывай каждый участок 4-5 раз вертикально, горизонтально, диагонально.\n4. Сразу нанеси пептидную сыворотку или миноксидил (если используешь).\n5. Не мой голову 4-6 часов. Делай процедуру вечером перед сном раз в 7-10 дней.\n\n**Результат:** через 3-4 месяца появляются пушковые волосы, затем они утолщаются. Важно: не используй при активном воспалении.` }
        ]

      {
        id: 'c3',
        icon: '👁️',

        count: 4,
        articles: [
          { title: 'Темные круги: коррекция', text: `**Откуда берутся?** Тонкая кожа под глазами просвечивает сосуды (синева) или скапливается пигмент (коричневый). Факторы: недосып, генетика, аллергия, трение глаз.\n\n**Система:**\n1. Кофеин-гель утром: The Ordinary Caffeine Solution 5% + EGCG (~1100₽) сужает сосуды, осветляет. Храни в холодильнике для дополнительного противоотёчного эффекта.\n2. Гидрогелевые патчи (Petitfee, ~800₽) 15 минут — лимфодренаж и увлажнение.\n3. Спи на высокой подушке, чтобы жидкость не застаивалась.\n4. Массаж ложками: металлические ложки в морозилку на 10 минут, водить выпуклой стороной от переносицы к вискам.\n\n**Секрет экстренной помощи:** геморроидальная мазь (Релиф) — сильное сосудосуживающее, наносить тончайшим слоем только на 10-15 минут, не чаще 1-2 раз в месяц. Убирает отёк моментально, но злоупотреблять нельзя.` },
          { title: 'Отеки: массаж ложками', text: `**Лимфодренаж холодом** — мгновенный результат. Берём 2 металлические ложки, охлаждаем в морозилке или в стакане со льдом 10 минут. Наносим на область вокруг глаз лёгкий крем или масло (чтобы ложки скользили). Водим выпуклой стороной от внутреннего угла глаза по нижнему веку к виску, затем вниз к лимфоузлам за ушами и ключицам. Повторить 5-7 раз. Контрастное умывание: тёплая и прохладная вода попеременно. Делать каждое утро — отёки уходят, взгляд становится открытым, тонизирует кожу, профилактика морщин.` },
          { title: 'Гусиные лапки: профилактика', text: `**Почему появляются?** Кожа вокруг глаз в 3 раза тоньше, практически без сальных желёз и коллагена. Мимика, солнце, сухость ускоряют появление морщин.\n**Уход:** крем с ретинолом для век (La Roche-Posay Redermic R Eyes, ~1800₽) — только вечер, капля на орбитальную косточку, не на подвижное веко. Днём обязательно SPF в этой зоне.\n**Упражнение:** сильно зажмурься на 5 секунд, максимально расслабь — 10 повторов. Укрепляет круговую мышцу глаза, улучшает микроциркуляцию.\n**Привычка:** не три глаза! Если чешутся — используй увлажняющие капли. Спать на спине, чтобы не создавать заломов. Шёлковая наволочка уменьшает трение.` },
          { title: 'Секрет: аптечный ролик', text: `Дорогие кофеиновые ролики можно заменить аптечной настойкой календулы. Разводим 1:2 с водой, переливаем во флакон с роликовым аппликатором (продаётся в косметических магазинах или на Ozon, ~100₽). Храним в холодильнике. Календула обладает противовоспалительным, успокаивающим действием, а холод сужает сосуды. Эффект как от флюида за 2000₽, но цена ~50₽. Использовать утром после умывания, не смывать.` }

          { title: 'Уход без трещин', text: `**Особенность:** на губах нет сальных желёз, они не вырабатывают собственную защиту, поэтому сохнут первыми. Бальзам должен быть с SPF (Carmex SPF15, ~400₽) и без ментола/фенола (они пересушивают). Наноси каждые 2-3 часа, особенно на улице.\n**Скраб 1 раз в неделю:** мёд + мелкий сахар (1:1), массировать 30 секунд, смыть. Сразу после — толстый слой масла ши или пантеноловой мази (Бепантен). Ночью можно сделать маску: смесь вазелина и масла ши, плотным слоем. Утром губы нежные, без шелушений. Пей воду — обезвоживание сказывается и на губах.` },
          { title: 'Увеличение губ естественно', text: `**Без уколов.** Массаж мягкой зубной щёткой (обязательно мягкая, не травмировать) 1 минуту — прилив крови делает губы ярче и чуть полнее. После — нанести бальзам с корицей или мятой (если нет аллергии), они вызывают лёгкое раздражение и отёк, объём держится пару часов. Осторожно: сильно печёт, не переусердствовать. Также работает масло корицы (1 капля на бальзам) — тест на запястье сначала. Эффект временный, но заметный.` },
          { title: 'Секрет: масло ши и никотинка', text: `**Рецепт глубокого восстановления:** никотиновая кислота (ампулы для инъекций, 50₽) усиливает микроциркуляцию, а масло ши питает. Смешиваем 2 части масла ши + 1 часть никотиновой кислоты, наносим на губы толстым слоем на 15-20 минут. Затем излишки промокнуть салфеткой. Трещины заживают за ночь, губы становятся гладкими, цвет улучшается. Применять курсом 5-7 дней. Не использовать при герпесе.` }

    function hideSplash() {
      document.getElementById('splash').classList.add('hidden');
      setTimeout(() => {
        document.getElementById('app').classList.add('visible');
      }, 300);
    }

    function updatePremiumUI() {
      const badge = document.getElementById('premBadge');
      if (isPremium) {
        badge.textContent = 'PREMIUM 🔓';
        badge.classList.remove('inactive');
      } else {
        badge.textContent = 'FREE';
        badge.classList.add('inactive');
      }
    }

    function switchTab(tab) {
      currentTab = tab;
      document.getElementById('tabFree').classList.toggle('active', tab === 'free');
      document.getElementById('tabPremium').classList.toggle('active', tab === 'premium');
      renderContent();
    }

    function renderContent() {
      const container = document.getElementById('contentContainer');
      container.innerHTML = '';
      container.classList.add('fade-in');
      setTimeout(() => container.classList.remove('fade-in'), 500);

      if (currentTab === 'free') {
        freeArticles.forEach(article => {
          const el = document.createElement('div');
          el.className = 'article-list-item';
          el.innerHTML = `<span>${article.title}</span>`;
          el.onclick = () => showArticle(article.title, article.text);
          container.appendChild(el);
        });
      } else {
        const grid = document.createElement('div');
        grid.className = 'categories-grid';
        premiumCategories.forEach(cat => {
          const card = document.createElement('div');
          card.className = 'category-card';
          card.innerHTML = `
            <div class="category-icon">${cat.icon}</div>
            <div class="category-name">${cat.name}</div>
            <div class="article-count">${cat.count} статьи</div>
          `;
          card.onclick = () => showCategory(cat);
          grid.appendChild(card);
        });
        container.appendChild(grid);
      }
    }

      if (!isPremium) {
        openModal();
        return;

      currentCategory = cat;
      const container = document.getElementById('contentContainer');
      container.innerHTML = `<button class="back-btn" onclick="renderContent()" style="background:none;border:none;color:#d4af37;font-size:24px;margin-bottom:15px;">← Назад</button>`;
      cat.articles.forEach((article, idx) => {

      let html = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      const paragraphs = html.split(/\n\n+/);
      html = paragraphs.map(p => {
        p = p.trim();
        if (!p) return '';
        p = p.replace(/\n/g, '<br>');
        return `<p>${p}</p>`;
      }).join('');
      html = html.replace(/(\b\d+[₽]\b)/g, '<span class="price-tag">$1</span>');
      html = html.replace(/<p>(🔥|💧|✨|💡|🛠|🪥|🧴|🧪|💎|🧵|👅|💇‍♂️|👁️|👄|🦷|🚿|💧|😴|🚬|🧘|🥗|🧠|👔|🧴|СЕКРЕТ|ЛУЧШИЕ|ТОП|ИНСТРУКЦИЯ|МЕТОДИКА|РЕЦЕПТ|Бонус)/g, '<p><strong>$1</strong>');
      return html;
    }

    function openModal() {
      document.getElementById('modal').classList.add('active');
      document.getElementById('keyError').textContent = '';
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('active');
      document.getElementById('keyInput').value = '';
    }

    function activatePremium() {
      const input = document.getElementById('keyInput').value.trim();
      if (input === validKey) {
        isPremium = true;
        localStorage.setItem('ascend_premium', 'true');
        updatePremiumUI();
        closeModal();
        if (currentTab === 'premium') renderContent();
      } else {
        document.getElementById('keyError').textContent = 'Неверный ключ';
      }
    }

    document.getElementById('modal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });
  </script>
</body>
</html>
